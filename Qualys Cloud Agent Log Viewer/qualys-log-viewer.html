<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Qualys Cloud Agent Log Viewer</title>
<style>
  :root {
    --bg: #1e1e2e;
    --surface: #282840;
    --surface2: #313150;
    --border: #45456a;
    --text: #cdd6f4;
    --text-dim: #8888aa;
    --info: #89b4fa;
    --warn: #f9e2af;
    --error: #f38ba8;
    --debug: #a6adc8;
    --success: #a6e3a1;
    --accent: #b4befe;
    --header-bg: #1a1a2e;
    --ps-error: #f38ba8;
    --ps-category: #cba6f7;
    --ps-pointer: #fab387;
    --no-output: #585880;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Helvetica Neue', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  .app-header {
    background: var(--header-bg);
    border-bottom: 1px solid var(--border);
    padding: 12px 24px;
    display: flex;
    align-items: center;
    gap: 16px;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .app-header h1 {
    font-size: 16px;
    font-weight: 600;
    color: var(--accent);
    white-space: nowrap;
  }

  .upload-zone {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 80vh;
    padding: 40px;
  }

  .upload-box {
    border: 2px dashed var(--border);
    border-radius: 16px;
    padding: 60px 80px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    background: var(--surface);
    max-width: 500px;
  }

  .upload-box:hover, .upload-box.dragover {
    border-color: var(--accent);
    background: var(--surface2);
  }

  .upload-box .icon { font-size: 48px; margin-bottom: 16px; }
  .upload-box h2 { font-size: 18px; margin-bottom: 8px; color: var(--text); }
  .upload-box p { font-size: 13px; color: var(--text-dim); }

  #fileInput { display: none; }

  /* Main viewer layout */
  .viewer { display: none; }

  .toolbar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 8px 24px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
    position: sticky;
    top: 45px;
    z-index: 99;
  }

  .toolbar input[type="text"] {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 6px 12px;
    color: var(--text);
    font-size: 13px;
    width: 280px;
    outline: none;
  }

  .toolbar input[type="text"]:focus { border-color: var(--accent); }

  .filter-btn {
    padding: 5px 12px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text-dim);
    font-size: 12px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .filter-btn:hover { border-color: var(--accent); color: var(--text); }
  .filter-btn.active { background: var(--accent); color: var(--bg); border-color: var(--accent); font-weight: 600; }

  .stats {
    margin-left: auto;
    font-size: 12px;
    color: var(--text-dim);
    white-space: nowrap;
  }

  /* Asset info banner */
  .asset-banner {
    background: var(--surface);
    padding: 12px 24px;
    display: flex;
    gap: 32px;
    flex-wrap: wrap;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
  }

  .asset-banner .field { display: flex; gap: 6px; }
  .asset-banner .label { color: var(--text-dim); }
  .asset-banner .value { color: var(--text); font-weight: 500; }
  .asset-banner .value.status-error { color: var(--error); }
  .asset-banner .value.status-pass { color: var(--success); }
  .asset-banner .value.status-pending { color: var(--warn); }
  .asset-banner .value.disconnected { color: var(--error); }

  /* Asset tabs for multi-asset reports */
  .asset-tabs {
    background: var(--header-bg);
    padding: 0 24px;
    display: flex;
    gap: 2px;
    border-bottom: 1px solid var(--border);
    overflow-x: auto;
  }

  .asset-tab {
    padding: 8px 16px;
    font-size: 13px;
    color: var(--text-dim);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    white-space: nowrap;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .asset-tab:hover { color: var(--text); }
  .asset-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
  .asset-tab .tab-badge {
    font-size: 10px;
    padding: 1px 5px;
    border-radius: 8px;
    font-weight: 600;
  }
  .asset-tab .tab-badge.has-output { background: var(--success); color: var(--bg); }
  .asset-tab .tab-badge.no-output { background: var(--no-output); color: var(--text-dim); }
  .asset-tab .tab-badge.has-errors { background: var(--error); color: var(--bg); }

  /* Event groups */
  .log-container { padding: 16px 24px; }

  .event-group {
    margin-bottom: 16px;
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
  }

  .event-group-header {
    background: var(--surface2);
    padding: 8px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    cursor: pointer;
    user-select: none;
    font-size: 13px;
  }

  .event-group-header:hover { background: var(--surface); }

  .event-group-header .timestamp {
    color: var(--accent);
    font-family: 'SF Mono', 'Menlo', monospace;
    font-size: 12px;
    white-space: nowrap;
  }

  .event-group-header .summary {
    color: var(--text-dim);
    font-size: 12px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    flex: 1;
    min-width: 0;
  }

  .event-group-header .count {
    margin-left: auto;
    background: var(--surface);
    border-radius: 10px;
    padding: 2px 8px;
    font-size: 11px;
    color: var(--text-dim);
    white-space: nowrap;
    flex-shrink: 0;
  }

  .event-group-header .chevron {
    transition: transform 0.2s;
    color: var(--text-dim);
    font-size: 10px;
    flex-shrink: 0;
  }

  .event-group.collapsed .chevron { transform: rotate(-90deg); }
  .event-group.collapsed .event-group-body { display: none; }

  .event-group-body { padding: 0; }

  /* Log lines */
  .log-line {
    display: flex;
    padding: 3px 16px;
    font-family: 'SF Mono', 'Menlo', monospace;
    font-size: 12px;
    line-height: 1.6;
    border-bottom: 1px solid rgba(69, 69, 106, 0.3);
    transition: background 0.1s;
  }

  .log-line:last-child { border-bottom: none; }
  .log-line:hover { background: rgba(180, 190, 254, 0.05); }

  .log-line .line-num {
    color: var(--text-dim);
    min-width: 36px;
    text-align: right;
    margin-right: 12px;
    user-select: none;
    font-size: 11px;
    opacity: 0.5;
    flex-shrink: 0;
  }

  .log-line .time {
    color: var(--text-dim);
    min-width: 200px;
    white-space: nowrap;
    margin-right: 8px;
    flex-shrink: 0;
  }

  .log-line .level {
    min-width: 90px;
    margin-right: 8px;
    font-weight: 600;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .log-line .level.info, .log-line .level.information { color: var(--info); }
  .log-line .level.warning { color: var(--warn); }
  .log-line .level.error { color: var(--error); }
  .log-line .level.debug { color: var(--debug); }

  .log-line .process {
    color: var(--text-dim);
    margin-right: 8px;
    white-space: nowrap;
    font-size: 11px;
    flex-shrink: 0;
  }

  .log-line .message {
    color: var(--text);
    word-break: break-word;
    flex: 1;
    min-width: 0;
  }

  .log-line.level-warning { background: rgba(249, 226, 175, 0.04); }
  .log-line.level-error { background: rgba(243, 139, 168, 0.06); }

  /* Non-parsed lines (header banner, etc) */
  .log-line.raw .message { color: var(--text-dim); }
  .log-line.banner { background: var(--surface2); }
  .log-line.banner .message { color: var(--accent); font-weight: 500; }

  /* PowerShell error styling */
  .log-line.ps-error { background: rgba(243, 139, 168, 0.06); }
  .log-line.ps-error .message { color: var(--ps-error); }
  .log-line.ps-stacktrace .message { color: var(--text-dim); font-size: 11px; }
  .log-line.ps-category .message { color: var(--ps-category); font-size: 11px; }
  .log-line.ps-pointer .message { color: var(--ps-pointer); }

  .highlight { background: rgba(249, 226, 175, 0.3); border-radius: 2px; padding: 0 1px; }

  .no-results {
    text-align: center;
    padding: 40px;
    color: var(--text-dim);
    font-size: 14px;
  }

  /* No output placeholder */
  .no-output-notice {
    text-align: center;
    padding: 60px 40px;
    color: var(--text-dim);
  }

  .no-output-notice .icon { font-size: 36px; margin-bottom: 12px; opacity: 0.5; }
  .no-output-notice h3 { font-size: 16px; margin-bottom: 8px; color: var(--text-dim); }
  .no-output-notice p { font-size: 13px; color: var(--no-output); }
  .no-output-notice .status-tag {
    display: inline-block;
    margin-top: 12px;
    padding: 4px 12px;
    border-radius: 6px;
    font-size: 12px;
    font-family: 'SF Mono', 'Menlo', monospace;
  }
  .no-output-notice .status-tag.pending { background: rgba(249, 226, 175, 0.15); color: var(--warn); }
  .no-output-notice .status-tag.disconnected { background: rgba(243, 139, 168, 0.15); color: var(--error); }

  /* Reset button */
  .reset-btn {
    padding: 5px 12px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text-dim);
    font-size: 12px;
    cursor: pointer;
  }
  .reset-btn:hover { border-color: var(--error); color: var(--error); }

  /* Header action buttons */
  .header-actions {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-left: auto;
  }

  .header-btn {
    padding: 5px 14px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text-dim);
    font-size: 12px;
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 5px;
    white-space: nowrap;
  }
  .header-btn:hover { border-color: var(--accent); color: var(--text); }

  /* Version status badge */
  .version-badge {
    padding: 4px 12px;
    border-radius: 6px;
    font-size: 11px;
    font-weight: 600;
    white-space: nowrap;
    display: flex;
    align-items: center;
    gap: 5px;
    transition: all 0.15s;
  }
  .version-badge.checking {
    background: rgba(136, 136, 170, 0.15);
    color: var(--text-dim);
  }
  .version-badge.latest {
    background: rgba(166, 227, 161, 0.15);
    color: var(--success);
  }
  .version-badge.update-available {
    background: rgba(249, 226, 175, 0.15);
    color: var(--warn);
  }
  .version-badge.update-available a {
    color: var(--warn);
    text-decoration: underline;
    text-underline-offset: 2px;
  }
  .version-badge.update-available a:hover {
    color: var(--text);
  }
  .version-badge.error {
    background: rgba(136, 136, 170, 0.1);
    color: var(--text-dim);
    font-weight: 400;
  }

  /* Log type badge */
  .log-type-badge {
    padding: 3px 10px;
    border-radius: 6px;
    font-size: 11px;
    font-weight: 600;
    white-space: nowrap;
  }
  .log-type-badge.linux { background: rgba(166, 227, 161, 0.15); color: var(--success); }
  .log-type-badge.windows { background: rgba(137, 180, 250, 0.15); color: var(--info); }
  .log-type-badge.unknown { background: rgba(136, 136, 170, 0.15); color: var(--text-dim); }
</style>
</head>
<body>

<div class="app-header">
  <h1>Qualys Cloud Agent Log Viewer</h1>
  <button class="header-btn" id="headerNewFileBtn" style="display:none" title="Load a new file">&#128196; New File</button>
  <span class="log-type-badge unknown" id="osBadge" style="display:none"></span>
  <div class="header-actions">
    <span class="version-badge checking" id="versionBadge">Checking version...</span>
    <button class="header-btn" id="helpBtn" title="Help &amp; Documentation">&#10068; Help</button>
  </div>
</div>

<div id="uploadZone" class="upload-zone">
  <div class="upload-box" id="uploadBox">
    <div class="icon">&#128196;</div>
    <h2>Drop Qualys Log File</h2>
    <p>or click to browse &mdash; supports .csv (CAR reports), .log files, .zip, and .tar.gz archives</p>
  </div>
  <input type="file" id="fileInput" accept=".csv,.log,.zip,.tar.gz,.gz">
</div>

<div id="viewer" class="viewer">
  <div class="asset-tabs" id="assetTabs"></div>
  <div class="asset-banner" id="assetBanner"></div>
  <div class="toolbar" id="toolbar">
    <input type="text" id="searchBox" placeholder="Search log messages..." autocomplete="off">
    <button class="filter-btn active" data-level="all">All</button>
    <button class="filter-btn" data-level="Information">Info</button>
    <button class="filter-btn" data-level="Warning">Warning</button>
    <button class="filter-btn" data-level="Error">Error</button>
    <button class="filter-btn" data-level="Debug">Debug</button>
    <span class="stats" id="stats"></span>
    <button class="reset-btn" id="resetBtn">New File</button>
  </div>
  <div class="log-container" id="logContainer"></div>
</div>

<script>
const uploadBox = document.getElementById('uploadBox');
const fileInput = document.getElementById('fileInput');
const uploadZone = document.getElementById('uploadZone');
const viewer = document.getElementById('viewer');
const logContainer = document.getElementById('logContainer');
const searchBox = document.getElementById('searchBox');
const statsEl = document.getElementById('stats');
const assetTabs = document.getElementById('assetTabs');
const assetBanner = document.getElementById('assetBanner');
const resetBtn = document.getElementById('resetBtn');
const osBadge = document.getElementById('osBadge');
const toolbar = document.getElementById('toolbar');

let allAssets = [];
let currentAssetIdx = 0;
let currentFilter = 'all';
let currentSearch = '';

uploadBox.addEventListener('click', () => fileInput.click());
uploadBox.addEventListener('dragover', e => { e.preventDefault(); uploadBox.classList.add('dragover'); });
uploadBox.addEventListener('dragleave', () => uploadBox.classList.remove('dragover'));
uploadBox.addEventListener('drop', e => {
  e.preventDefault();
  uploadBox.classList.remove('dragover');
  if (e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]);
});
fileInput.addEventListener('change', e => { if (e.target.files.length) handleFile(e.target.files[0]); });
resetBtn.addEventListener('click', () => {
  viewer.style.display = 'none';
  uploadZone.style.display = 'flex';
  osBadge.style.display = 'none';
  fileInput.value = '';
  allAssets = [];
});

function handleFile(file) {
  const name = file.name.toLowerCase();

  if (name.endsWith('.zip')) {
    handleZipFile(file);
  } else if (name.endsWith('.tar.gz') || name.endsWith('.tgz')) {
    handleTarGzFile(file);
  } else if (name.endsWith('.log') || name.endsWith('.txt')) {
    handleRawLogFile(file);
  } else if (name.endsWith('.csv')) {
    handleCSVFile(file);
  } else {
    // Try as raw text
    handleRawLogFile(file);
  }
}

function showViewer(data) {
  allAssets = data;
  currentAssetIdx = 0;

  const osType = detectOSType(data);
  osBadge.textContent = osType === 'windows' ? 'Windows' : osType === 'linux' ? 'Linux' : 'Unknown OS';
  osBadge.className = 'log-type-badge ' + osType;
  osBadge.style.display = '';

  uploadZone.style.display = 'none';
  viewer.style.display = 'block';
  document.getElementById('headerNewFileBtn').style.display = '';
  buildAssetTabs();
  const firstWithOutput = data.findIndex(a => (a['Script Result'] || '').trim().length > 0);
  showAsset(firstWithOutput >= 0 ? firstWithOutput : 0);
}

function handleCSVFile(file) {
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = parseCSV(e.target.result);
      if (!data.length) { alert('No data rows found in CSV.'); return; }
      showViewer(data);
    } catch (err) {
      alert('Error parsing CSV: ' + err.message);
      console.error(err);
    }
  };
  reader.readAsText(file);
}

function handleRawLogFile(file) {
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const text = e.target.result;
      if (!text.trim()) { alert('File is empty.'); return; }
      const asset = buildAssetFromLog(file.name, text);
      showViewer([asset]);
    } catch (err) {
      alert('Error reading log file: ' + err.message);
      console.error(err);
    }
  };
  reader.readAsText(file);
}

function buildAssetFromLog(filename, text) {
  // Detect OS from log content
  let tech = 'Unknown';
  if (/\[qualys-cloud-agent\]|\[qualys-cep\]|\[qualys-health-check\]/.test(text.slice(0, 2000))) {
    // Check for platform hints
    if (/Platform.*LINUX|\/var\/log\/qualys/i.test(text.slice(0, 5000))) tech = 'Linux';
    else if (/Platform.*WINDOWS|C:\\ProgramData\\Qualys/i.test(text.slice(0, 5000))) tech = 'Windows';
  }
  // Extract hostname from CAPI payload if present
  let hostname = filename;
  const hostMatch = text.match(/"ComputerName"\s*:\s*"([^"]+)"/);
  if (hostMatch) hostname = hostMatch[1];

  return {
    'Asset Title': hostname,
    'Technology': tech,
    'Agent Uuid': '',
    'Status': 'DIRECT LOG',
    'Is Asset Disconnected': 'false',
    'Script Result': text,
    'Execution Start Time (In UTC)': '',
    'Duration in Milliseconds': '',
    'Return Code': '',
  };
}

async function handleZipFile(file) {
  try {
    const buffer = await file.arrayBuffer();
    const logFiles = await extractLogFilesFromZipAsync(buffer);
    if (!logFiles.length) { alert('No .log files found in ZIP archive.'); return; }
    const assets = logFiles.map(f => buildAssetFromLog(f.name, f.content));
    showViewer(assets);
  } catch (err) {
    alert('Error reading ZIP: ' + err.message);
    console.error(err);
  }
}

function extractLogFilesFromZip(buffer) {
  const view = new DataView(buffer);
  const files = [];
  let offset = 0;
  const decoder = new TextDecoder();

  while (offset < buffer.byteLength - 4) {
    const sig = view.getUint32(offset, true);
    if (sig !== 0x04034b50) break; // local file header signature

    const compressionMethod = view.getUint16(offset + 8, true);
    const compressedSize = view.getUint32(offset + 18, true);
    const uncompressedSize = view.getUint32(offset + 22, true);
    const nameLen = view.getUint16(offset + 26, true);
    const extraLen = view.getUint16(offset + 28, true);
    const nameBytes = new Uint8Array(buffer, offset + 30, nameLen);
    const fileName = decoder.decode(nameBytes);
    const dataStart = offset + 30 + nameLen + extraLen;

    if (fileName.endsWith('.log') && !fileName.startsWith('__MACOSX')) {
      if (compressionMethod === 0) {
        // Stored (no compression)
        const raw = new Uint8Array(buffer, dataStart, uncompressedSize);
        files.push({ name: fileName.split('/').pop(), content: decoder.decode(raw) });
      } else if (compressionMethod === 8) {
        // Deflated — use DecompressionStream
        try {
          const compressed = new Uint8Array(buffer, dataStart, compressedSize);
          const decompressed = inflateRaw(compressed);
          files.push({ name: fileName.split('/').pop(), content: decoder.decode(decompressed) });
        } catch (e) {
          console.warn('Could not decompress ' + fileName, e);
        }
      }
    }

    offset = dataStart + compressedSize;
  }
  return files;
}

function inflateRaw(compressed) {
  // Use the browser's DecompressionStream API for deflate-raw
  // Fallback: synchronous inflate via a trick with Response + DecompressionStream
  // We'll use a synchronous approach that works in modern browsers
  const ds = new DecompressionStream('deflate-raw');
  const writer = ds.writable.getWriter();
  const reader = ds.readable.getReader();
  writer.write(compressed);
  writer.close();

  // Collect all chunks
  const chunks = [];
  let totalLen = 0;

  // Return a promise-based result — we need to make handleZipFile async-aware
  return new Promise(async (resolve, reject) => {
    try {
      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        chunks.push(value);
        totalLen += value.length;
      }
      const result = new Uint8Array(totalLen);
      let pos = 0;
      for (const chunk of chunks) {
        result.set(chunk, pos);
        pos += chunk.length;
      }
      resolve(result);
    } catch (e) { reject(e); }
  });
}

async function extractLogFilesFromZipAsync(buffer) {
  const view = new DataView(buffer);
  const files = [];
  const decoder = new TextDecoder();
  let offset = 0;

  while (offset < buffer.byteLength - 4) {
    const sig = view.getUint32(offset, true);
    if (sig !== 0x04034b50) break;

    const compressionMethod = view.getUint16(offset + 8, true);
    const compressedSize = view.getUint32(offset + 18, true);
    const uncompressedSize = view.getUint32(offset + 22, true);
    const nameLen = view.getUint16(offset + 26, true);
    const extraLen = view.getUint16(offset + 28, true);
    const nameBytes = new Uint8Array(buffer, offset + 30, nameLen);
    const fileName = decoder.decode(nameBytes);
    const dataStart = offset + 30 + nameLen + extraLen;

    if (fileName.endsWith('.log') && !fileName.startsWith('__MACOSX')) {
      if (compressionMethod === 0) {
        const raw = new Uint8Array(buffer, dataStart, uncompressedSize);
        files.push({ name: fileName.split('/').pop(), content: decoder.decode(raw) });
      } else if (compressionMethod === 8) {
        try {
          const compressed = new Uint8Array(buffer, dataStart, compressedSize);
          const decompressed = await inflateRaw(compressed);
          files.push({ name: fileName.split('/').pop(), content: decoder.decode(decompressed) });
        } catch (e) {
          console.warn('Could not decompress ' + fileName, e);
        }
      }
    }
    offset = dataStart + compressedSize;
  }
  return files;
}

async function handleTarGzFile(file) {
  try {
    const buffer = await file.arrayBuffer();
    // Decompress gzip first
    const ds = new DecompressionStream('gzip');
    const writer = ds.writable.getWriter();
    const reader = ds.readable.getReader();
    writer.write(new Uint8Array(buffer));
    writer.close();

    const chunks = [];
    let totalLen = 0;
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      chunks.push(value);
      totalLen += value.length;
    }
    const tarBuffer = new Uint8Array(totalLen);
    let pos = 0;
    for (const chunk of chunks) {
      tarBuffer.set(chunk, pos);
      pos += chunk.length;
    }

    // Parse tar
    const logFiles = parseTar(tarBuffer);
    if (!logFiles.length) { alert('No .log files found in tar.gz archive.'); return; }
    const assets = logFiles.map(f => buildAssetFromLog(f.name, f.content));
    showViewer(assets);
  } catch (err) {
    alert('Error reading tar.gz: ' + err.message);
    console.error(err);
  }
}

function parseTar(buffer) {
  const decoder = new TextDecoder();
  const files = [];
  let offset = 0;

  while (offset < buffer.length - 512) {
    const header = buffer.slice(offset, offset + 512);
    // Check for empty block (end of archive)
    if (header.every(b => b === 0)) break;

    const nameBytes = header.slice(0, 100);
    let name = decoder.decode(nameBytes).replace(/\0/g, '').trim();

    // POSIX ustar prefix
    const prefix = decoder.decode(header.slice(345, 500)).replace(/\0/g, '').trim();
    if (prefix) name = prefix + '/' + name;

    // File size in octal at offset 124, length 12
    const sizeStr = decoder.decode(header.slice(124, 136)).replace(/\0/g, '').trim();
    const size = parseInt(sizeStr, 8) || 0;

    // Type flag at offset 156
    const typeFlag = header[156];

    offset += 512; // move past header

    // typeFlag 0 or ASCII '0' (48) = regular file
    if ((typeFlag === 0 || typeFlag === 48) && size > 0 && name.endsWith('.log')) {
      const content = decoder.decode(buffer.slice(offset, offset + size));
      files.push({ name: name.split('/').pop(), content });
    }

    // Advance past file data (512-byte aligned)
    offset += Math.ceil(size / 512) * 512;
  }
  return files;
}

function detectOSType(assets) {
  for (const a of assets) {
    const tech = (a['Technology'] || '').toLowerCase();
    if (tech.includes('windows')) return 'windows';
    if (tech.includes('linux') || tech.includes('red hat') || tech.includes('ubuntu') ||
        tech.includes('centos') || tech.includes('debian') || tech.includes('suse') ||
        tech.includes('amazon linux') || tech.includes('oracle linux')) return 'linux';
  }
  return 'unknown';
}

function parseCSV(text) {
  // Normalize line endings in the overall CSV structure
  text = text.replace(/\r\n/g, '\n').replace(/\r/g, '\n');

  const lines = text.split('\n');
  let headerIdx = -1;
  for (let i = 0; i < Math.min(10, lines.length); i++) {
    if (lines[i].startsWith('Asset ID,')) { headerIdx = i; break; }
  }
  if (headerIdx === -1) { throw new Error('Could not find column headers (Asset ID,...)'); }

  const headers = parseCSVRow(lines[headerIdx]);
  const assets = [];

  let remaining = lines.slice(headerIdx + 1).join('\n');
  while (remaining.trim()) {
    const { row, rest } = parseCSVRecord(remaining);
    if (row && row.length >= headers.length) {
      const obj = {};
      headers.forEach((h, i) => obj[h.trim()] = (row[i] || '').trim());
      assets.push(obj);
    }
    remaining = rest;
  }
  return assets;
}

function parseCSVRow(line) {
  const result = [];
  let current = '';
  let inQuotes = false;
  for (let i = 0; i < line.length; i++) {
    const ch = line[i];
    if (inQuotes) {
      if (ch === '"' && line[i + 1] === '"') { current += '"'; i++; }
      else if (ch === '"') { inQuotes = false; }
      else { current += ch; }
    } else {
      if (ch === '"') { inQuotes = true; }
      else if (ch === ',') { result.push(current); current = ''; }
      else { current += ch; }
    }
  }
  result.push(current);
  return result;
}

function parseCSVRecord(text) {
  const row = [];
  let current = '';
  let inQuotes = false;
  let i = 0;
  while (i < text.length) {
    const ch = text[i];
    if (inQuotes) {
      if (ch === '"' && text[i + 1] === '"') { current += '"'; i += 2; }
      else if (ch === '"') { inQuotes = false; i++; }
      else { current += ch; i++; }
    } else {
      if (ch === '"') { inQuotes = true; i++; }
      else if (ch === ',') { row.push(current); current = ''; i++; }
      else if (ch === '\n') {
        row.push(current);
        i++;
        return { row, rest: text.slice(i) };
      }
      else { current += ch; i++; }
    }
  }
  row.push(current);
  return { row, rest: '' };
}

function buildAssetTabs() {
  assetTabs.innerHTML = '';
  if (allAssets.length <= 1) { assetTabs.style.display = 'none'; return; }
  assetTabs.style.display = 'flex';
  allAssets.forEach((a, i) => {
    const tab = document.createElement('div');
    tab.className = 'asset-tab' + (i === 0 ? ' active' : '');
    const hasOutput = (a['Script Result'] || '').trim().length > 0;
    const status = a['Status'] || '';
    const isDisconnected = (a['Is Asset Disconnected'] || '').toLowerCase() === 'true';

    let badgeClass = 'no-output';
    let badgeText = '--';
    if (hasOutput && status === 'EXECUTION PASSED') {
      badgeClass = 'has-output';
      badgeText = 'OK';
    } else if (hasOutput) {
      badgeClass = 'has-errors';
      badgeText = 'ERR';
    } else if (isDisconnected) {
      badgeClass = 'has-errors';
      badgeText = 'DC';
    }

    tab.innerHTML = `${escHtml(a['Asset Title'] || 'Asset ' + (i+1))} <span class="tab-badge ${badgeClass}">${badgeText}</span>`;
    tab.onclick = () => showAsset(i);
    assetTabs.appendChild(tab);
  });
}

function showAsset(idx) {
  currentAssetIdx = idx;
  const asset = allAssets[idx];

  // Update tab active state
  assetTabs.querySelectorAll('.asset-tab').forEach((t, i) => {
    t.classList.toggle('active', i === idx);
  });

  // Asset banner
  const status = asset['Status'] || '';
  const isDisconnected = (asset['Is Asset Disconnected'] || '').toLowerCase() === 'true';
  let statusClass = '';
  if (status === 'EXECUTION PASSED') statusClass = 'status-pass';
  else if (status === 'MANIFEST_PARSE_SUCCESS') statusClass = 'status-pending';
  else if (status) statusClass = 'status-error';

  const fields = [
    ['Host', asset['Asset Title'], ''],
    ['Technology', asset['Technology'], ''],
    ['Agent UUID', asset['Agent Uuid'], ''],
    ['Status', status, statusClass],
    ['Disconnected', isDisconnected ? 'Yes' : 'No', isDisconnected ? 'disconnected' : ''],
    ['Executed', asset['Execution Start Time (In UTC)'], ''],
    ['Duration', asset['Duration in Milliseconds'] ? asset['Duration in Milliseconds'] + 'ms' : '', ''],
    ['Return Code', asset['Return Code'], ''],
  ];
  assetBanner.innerHTML = fields
    .filter(([, v]) => v && v !== 'undefined' && v !== 'ms')
    .map(([l, v, cls]) => `<div class="field"><span class="label">${l}:</span><span class="value ${cls}">${escHtml(v)}</span></div>`)
    .join('');

  // Check if asset has output
  const rawResult = (asset['Script Result'] || '').trim();
  if (!rawResult) {
    toolbar.style.display = 'none';
    let reason = 'No script output available for this asset.';
    let tagClass = 'pending';
    if (status === 'MANIFEST_PARSE_SUCCESS') {
      reason = 'Job was dispatched but has not executed yet.';
    }
    if (isDisconnected) {
      reason = 'Agent is disconnected. Job cannot execute until the agent checks back in.';
      tagClass = 'disconnected';
    }
    logContainer.innerHTML = `<div class="no-output-notice">
      <div class="icon">&#9744;</div>
      <h3>No Output</h3>
      <p>${reason}</p>
      <span class="status-tag ${tagClass}">${escHtml(status || 'N/A')}</span>
    </div>`;
    asset._parsed = [];
    return;
  }

  toolbar.style.display = 'flex';

  // Parse log from Script Result
  let raw = rawResult;
  // Strip leading/trailing single quotes the CSV export may add
  if (raw.startsWith("'")) raw = raw.slice(1);
  if (raw.endsWith("'")) raw = raw.slice(0, -1);

  // Unescape: the CSV contains literal \n, \r\n, \', \\ sequences
  // Replace literal \r\n and \r first, then \n
  raw = raw.replace(/\\r\\n/g, '\n').replace(/\\r/g, '').replace(/\\n/g, '\n');
  // Unescape escaped single quotes and backslashes
  raw = raw.replace(/\\'/g, "'").replace(/\\\\/g, '\\');

  const logLines = raw.split('\n');

  // Detect log format: structured (Linux agent) vs unstructured (Windows PS errors / Windows agent)
  const parsed = parseLogLines(logLines);

  asset._parsed = parsed;
  asset._logType = parsed.logType;
  currentFilter = 'all';
  currentSearch = '';
  searchBox.value = '';
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.toggle('active', b.dataset.level === 'all'));

  renderLog();
}

// Linux agent log regex
const LINUX_LOG_RE = /^(\d{4}-\d{2}-\d{2}\s+\d{2}:\d{2}:\d{2}\.\d+)\s+([+-]\d{4})\s+\[([^\]]+)\]\[(\d+)\]:\[(\w+)\]:\[(\d+)\]:(.*)$/;

// Windows agent log regex (may differ — common format: timestamp [level] message)
const WIN_LOG_RE = /^(\d{4}-\d{2}-\d{2}\s+\d{2}:\d{2}:\d{2}[\.,]\d+)\s+([+-]\d{4})?\s*\[([^\]]+)\]\[(\d+)\]:\[(\w+)\]:\[(\d+)\]:(.*)$/;

// PowerShell error patterns
const PS_ERROR_START_RE = /^(\S[\w\-\.]+)\s*:\s*(.+)/;  // e.g., "Test-Path : A parameter cannot..."
const PS_AT_LINE_RE = /^At\s+\S+:\d+\s+char:\d+/;
const PS_PLUS_LINE_RE = /^\+\s+/;
const PS_CATEGORY_RE = /^\s*\+\s*CategoryInfo/;
const PS_FQID_RE = /^\s*\+\s*FullyQualifiedErrorId/;

function parseLogLines(lines) {
  const result = [];
  let structuredCount = 0;
  let psErrorCount = 0;

  // First pass: detect format
  for (const line of lines) {
    const trimmed = line.trim();
    if (!trimmed) continue;
    if (LINUX_LOG_RE.test(trimmed)) structuredCount++;
    if (PS_ERROR_START_RE.test(trimmed) && trimmed.includes(' : ')) psErrorCount++;
  }

  const isStructured = structuredCount > lines.length * 0.3;

  // Second pass: parse
  for (let i = 0; i < lines.length; i++) {
    const line = lines[i];
    const trimmed = line.trim();
    if (!trimmed) continue;

    // Try structured agent log parse (works for both Linux and Windows agent logs)
    const m = trimmed.match(LINUX_LOG_RE) || trimmed.match(WIN_LOG_RE);
    if (m) {
      result.push({
        timestamp: m[1],
        tz: m[2] || '',
        process: m[3],
        pid: m[4],
        level: m[5],
        threadId: m[6],
        message: m[7],
        raw: trimmed,
        isParsed: true,
        lineType: 'structured',
      });
      continue;
    }

    // Detect banner lines
    const isBanner = trimmed.startsWith('===') || trimmed.startsWith('Host:') || trimmed.startsWith('File:') ||
                     trimmed.startsWith('Size:') || trimmed.startsWith('Modified:') || trimmed.startsWith('Showing:');
    if (isBanner) {
      result.push({ raw: trimmed, isParsed: false, isBanner: true, level: '', message: trimmed, timestamp: '', lineType: 'banner' });
      continue;
    }

    // Detect PowerShell error blocks
    // Error start line: "CmdletName : Error message"
    if (PS_AT_LINE_RE.test(trimmed)) {
      result.push({ raw: trimmed, isParsed: false, isBanner: false, level: 'Error', message: trimmed, timestamp: '', lineType: 'ps-stacktrace' });
      continue;
    }
    if (PS_CATEGORY_RE.test(trimmed) || PS_FQID_RE.test(trimmed)) {
      result.push({ raw: trimmed, isParsed: false, isBanner: false, level: 'Error', message: trimmed, timestamp: '', lineType: 'ps-category' });
      continue;
    }
    if (PS_PLUS_LINE_RE.test(trimmed)) {
      result.push({ raw: trimmed, isParsed: false, isBanner: false, level: 'Error', message: trimmed, timestamp: '', lineType: 'ps-pointer' });
      continue;
    }

    // Check if it looks like a PS error start
    const psMatch = trimmed.match(PS_ERROR_START_RE);
    if (psMatch && trimmed.includes(' : ') && /^[A-Z]/.test(trimmed)) {
      result.push({ raw: trimmed, isParsed: false, isBanner: false, level: 'Error', message: trimmed, timestamp: '', lineType: 'ps-error' });
      continue;
    }

    // CategoryInfo / FullyQualifiedErrorId continuation lines (indented with spaces)
    if (/^\s+(CategoryInfo|FullyQualifiedErrorId)\s*:/.test(line)) {
      result.push({ raw: trimmed, isParsed: false, isBanner: false, level: 'Error', message: trimmed, timestamp: '', lineType: 'ps-category' });
      continue;
    }

    // Generic indented continuation (part of a PS error block)
    if (/^\s{3,}/.test(line) && result.length > 0 && result[result.length - 1].lineType && result[result.length - 1].lineType.startsWith('ps-')) {
      result.push({ raw: trimmed, isParsed: false, isBanner: false, level: 'Error', message: trimmed, timestamp: '', lineType: 'ps-stacktrace' });
      continue;
    }

    // Default: raw line
    result.push({ raw: trimmed, isParsed: false, isBanner: false, level: '', message: trimmed, timestamp: '', lineType: 'raw' });
  }

  result.logType = isStructured ? 'structured' : (psErrorCount > 0 ? 'powershell' : 'raw');
  return result;
}

function groupLines(lines) {
  const groups = [];
  let current = null;

  for (const line of lines) {
    // Banner lines in their own group
    if (line.lineType === 'banner') {
      if (!current || current.type !== 'banner') {
        current = { type: 'banner', lines: [], startTime: null, label: 'Header' };
        groups.push(current);
      }
      current.lines.push(line);
      continue;
    }

    // Structured log lines: group by time gap
    if (line.isParsed && line.timestamp) {
      const ts = new Date(line.timestamp.replace(' ', 'T') + 'Z').getTime();

      if (!current || current.type !== 'events' || (ts - current.lastTs) > 2000) {
        current = {
          type: 'events',
          lines: [],
          startTime: line.timestamp,
          lastTs: ts,
          firstTs: ts,
          label: '',
        };
        groups.push(current);
      }
      current.lines.push(line);
      current.lastTs = ts;
      continue;
    }

    // PowerShell error lines: group consecutive PS lines together
    if (line.lineType && line.lineType.startsWith('ps-')) {
      if (!current || current.type !== 'ps-error') {
        current = {
          type: 'ps-error',
          lines: [],
          startTime: null,
          label: '',
        };
        groups.push(current);
      }
      current.lines.push(line);
      continue;
    }

    // Raw lines: group consecutive raw lines
    if (!current || current.type !== 'raw') {
      current = { type: 'raw', lines: [], startTime: null, label: '' };
      groups.push(current);
    }
    current.lines.push(line);
  }

  // Build labels for groups
  for (const g of groups) {
    if (g.type === 'events') {
      const duration = ((g.lastTs - g.firstTs) / 1000).toFixed(1);
      const notable = g.lines.find(l => l.level === 'Warning' || l.level === 'Error');
      const first = g.lines[0];
      g.label = (notable || first).message.slice(0, 100);
      g.durationLabel = duration > 0 ? `${duration}s` : '';
    } else if (g.type === 'ps-error') {
      // Use the first error line as label
      const errLine = g.lines.find(l => l.lineType === 'ps-error');
      g.label = errLine ? errLine.message.slice(0, 100) : 'PowerShell Error';
    }
  }
  return groups;
}

function renderLog() {
  const asset = allAssets[currentAssetIdx];
  let lines = asset._parsed || [];

  if (!lines.length) {
    logContainer.innerHTML = '<div class="no-results">No log data to display.</div>';
    statsEl.textContent = '';
    return;
  }

  // Apply level filter
  if (currentFilter !== 'all') {
    lines = lines.filter(l => {
      if (l.lineType === 'banner') return true; // always show banners
      if (currentFilter === 'Error') return l.level === 'Error' || (l.lineType && l.lineType.startsWith('ps-'));
      return l.level === currentFilter;
    });
  }

  // Apply search
  const search = currentSearch.toLowerCase();
  if (search) {
    lines = lines.filter(l => l.raw.toLowerCase().includes(search));
  }

  const groups = groupLines(lines);

  // Stats
  const allLines = asset._parsed;
  const total = allLines.length;
  const shown = lines.length;
  const warnCount = allLines.filter(l => l.level === 'Warning').length;
  const errCount = allLines.filter(l => l.level === 'Error').length;
  const psErrGroups = allLines.filter(l => l.lineType === 'ps-error').length;
  let statsText = `${shown}/${total} lines`;
  if (warnCount) statsText += ` | ${warnCount} warnings`;
  if (errCount) statsText += ` | ${errCount} errors`;
  if (psErrGroups && !errCount) statsText += ` | ${psErrGroups} PS errors`;
  statsEl.textContent = statsText;

  if (!lines.length) {
    logContainer.innerHTML = '<div class="no-results">No matching log lines.</div>';
    return;
  }

  let html = '';
  let lineNum = 0;

  for (const group of groups) {
    const isBanner = group.type === 'banner';
    html += '<div class="event-group">';

    if (group.type === 'events') {
      const wc = group.lines.filter(l => l.level === 'Warning').length;
      const ec = group.lines.filter(l => l.level === 'Error').length;
      let countLabel = `${group.lines.length} lines`;
      if (ec) countLabel += ` | ${ec} err`;
      if (wc) countLabel += ` | ${wc} warn`;
      if (group.durationLabel) countLabel += ` | ${group.durationLabel}`;

      html += `<div class="event-group-header" onclick="this.parentElement.classList.toggle('collapsed')">
        <span class="chevron">&#9660;</span>
        <span class="timestamp">${escHtml(group.startTime)}</span>
        <span class="summary">${escHtml(group.label)}</span>
        <span class="count">${countLabel}</span>
      </div>`;
    } else if (group.type === 'ps-error') {
      html += `<div class="event-group-header" onclick="this.parentElement.classList.toggle('collapsed')">
        <span class="chevron">&#9660;</span>
        <span class="timestamp" style="color:var(--error)">PS Error</span>
        <span class="summary">${escHtml(group.label)}</span>
        <span class="count">${group.lines.length} lines</span>
      </div>`;
    } else if (group.type === 'raw' && !isBanner) {
      html += `<div class="event-group-header" onclick="this.parentElement.classList.toggle('collapsed')">
        <span class="chevron">&#9660;</span>
        <span class="timestamp" style="color:var(--text-dim)">Output</span>
        <span class="summary">${escHtml(group.lines[0]?.message.slice(0, 80) || '')}</span>
        <span class="count">${group.lines.length} lines</span>
      </div>`;
    }

    html += '<div class="event-group-body">';
    for (const line of group.lines) {
      lineNum++;

      if (line.isParsed) {
        const levelClass = line.level.toLowerCase();
        const msg = search ? highlightSearch(escHtml(line.message), search) : escHtml(line.message);
        html += `<div class="log-line level-${levelClass}">
          <span class="line-num">${lineNum}</span>
          <span class="time">${escHtml(line.timestamp)}</span>
          <span class="level ${levelClass}">${escHtml(line.level)}</span>
          <span class="process">[${escHtml(line.pid)}]</span>
          <span class="message">${msg}</span>
        </div>`;
      } else if (line.lineType === 'banner') {
        html += `<div class="log-line banner">
          <span class="line-num">${lineNum}</span>
          <span class="message">${escHtml(line.raw)}</span>
        </div>`;
      } else if (line.lineType && line.lineType.startsWith('ps-')) {
        const cls = line.lineType;
        const msg = search ? highlightSearch(escHtml(line.message), search) : escHtml(line.message);
        html += `<div class="log-line ${cls}">
          <span class="line-num">${lineNum}</span>
          <span class="message">${msg}</span>
        </div>`;
      } else {
        const msg = search ? highlightSearch(escHtml(line.message), search) : escHtml(line.message);
        html += `<div class="log-line raw">
          <span class="line-num">${lineNum}</span>
          <span class="message">${msg}</span>
        </div>`;
      }
    }
    html += '</div></div>';
  }

  logContainer.innerHTML = html;
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function highlightSearch(html, term) {
  const re = new RegExp(`(${term.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`, 'gi');
  return html.replace(re, '<span class="highlight">$1</span>');
}

// Filter buttons
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    currentFilter = btn.dataset.level;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.toggle('active', b === btn));
    renderLog();
  });
});

searchBox.addEventListener('input', () => {

    .catch(() => {
      badge.className = 'version-badge error';
      badge.textContent = 'v' + APP_VERSION;
