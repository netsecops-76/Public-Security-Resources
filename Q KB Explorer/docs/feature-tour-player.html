<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Q KB Explorer — Feature Tour</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0c10;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    min-height: 100vh; font-family: -apple-system, 'Segoe UI', sans-serif;
    overflow: hidden;
  }
  .player {
    position: relative;
    width: 1392px; max-width: 100vw;
    aspect-ratio: 1392 / 675;
    background: #111;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 20px 80px rgba(0,0,0,0.6);
  }
  .player img {
    width: 100%; height: 100%;
    object-fit: contain; display: block;
  }
  /* Subtitle bar */
  .subtitle-bar {
    position: absolute; bottom: 0; left: 0; right: 0;
    background: linear-gradient(transparent, rgba(0,0,0,0.85) 40%);
    padding: 32px 48px 20px;
    min-height: 80px;
    display: flex; align-items: flex-end; justify-content: center;
  }
  .subtitle-text {
    color: #fff;
    font-size: 22px; font-weight: 600;
    text-align: center;
    text-shadow: 0 2px 8px rgba(0,0,0,0.9), 0 0 30px rgba(0,0,0,0.5);
    line-height: 1.4;
    opacity: 0;
    transition: opacity 0.4s ease;
    max-width: 1100px;
  }
  .subtitle-text.visible { opacity: 1; }
  /* Progress bar */
  .progress-wrap {
    position: absolute; top: 0; left: 0; right: 0;
    height: 4px; background: rgba(255,255,255,0.1);
  }
  .progress-fill {
    height: 100%; background: linear-gradient(90deg, #4a7cff, #5d8dff);
    width: 0%; transition: width 0.3s linear;
    border-radius: 0 2px 2px 0;
  }
  /* Title card */
  .title-card {
    position: absolute; inset: 0;
    background: linear-gradient(135deg, #0a0c10, #181b22);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    z-index: 10; opacity: 1;
    transition: opacity 0.8s ease;
  }
  .title-card.hidden { opacity: 0; pointer-events: none; }
  .title-card h1 {
    color: #e8ecf4; font-size: 48px; font-weight: 700;
    letter-spacing: -1px; margin-bottom: 8px;
  }
  .title-card .accent { color: #4a7cff; }
  .title-card p {
    color: #6e7a94; font-size: 20px; font-weight: 400;
    margin-bottom: 32px;
  }
  .title-card .play-btn {
    padding: 14px 36px; background: #4a7cff; color: #fff;
    border: none; border-radius: 8px; font-size: 18px;
    font-weight: 600; cursor: pointer; transition: background 0.2s;
  }
  .title-card .play-btn:hover { background: #5d8dff; }
  /* End card */
  .end-card {
    position: absolute; inset: 0;
    background: linear-gradient(135deg, #0a0c10, #181b22);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    z-index: 10; opacity: 0; pointer-events: none;
    transition: opacity 0.8s ease;
  }
  .end-card.visible { opacity: 1; pointer-events: auto; }
  .end-card h2 { color: #fff; font-size: 42px; font-weight: 700; margin-bottom: 12px; }
  .end-card h2 .accent { color: #4a7cff; }
  .end-card p { color: #8a96b0; font-size: 17px; }
  .end-card .replay-btn {
    margin-top: 24px; padding: 12px 28px; background: #4a7cff;
    color: #fff; border: none; border-radius: 8px;
    font-size: 16px; font-weight: 600; cursor: pointer;
    transition: background 0.2s;
  }
  .end-card .replay-btn:hover { background: #5d8dff; }
  /* Responsive */
  @media (max-width: 1400px) {
    .player { width: 96vw; }
    .subtitle-text { font-size: 18px; }
    .title-card h1 { font-size: 36px; }
  }
</style>
</head>
<body>

<div class="player" id="player">
  <!-- Title card -->
  <div class="title-card" id="titleCard">
    <h1><span class="accent">Q</span> KB Explorer</h1>
    <p>Knowledge Base &amp; Policy Compliance — Feature Tour</p>
    <button class="play-btn" onclick="startTour()">Play Tour</button>
  </div>

  <!-- GIF -->
  <img id="tourGif" src="qkbe-feature-tour.gif" data-src="qkbe-feature-tour.gif" alt="Q KB Explorer Tour">

  <!-- Progress bar -->
  <div class="progress-wrap">
    <div class="progress-fill" id="progressFill"></div>
  </div>

  <!-- Subtitles -->
  <div class="subtitle-bar">
    <div class="subtitle-text" id="subtitle"></div>
  </div>

  <!-- End card -->
  <div class="end-card" id="endCard">
    <h2><span class="accent">Q</span> KB Explorer</h2>
    <p>Built by netsecops-76 &middot; Not affiliated with Qualys, Inc.</p>
    <button class="replay-btn" onclick="startTour()">Replay</button>
  </div>
</div>

<script>
// Subtitle cues: [startMs, endMs, text]
const CUES = [
  [0,     3800,  "Q KB Explorer \u2014 115,000+ vulnerability definitions synced from Qualys"],
  [4100,  7200,  "Type-ahead search updates results instantly as you type"],
  [7400,  10500, "3,030 results for \u201Capache\u201D \u2014 sorted by severity"],
  [10700, 14300, "Click any QID to see full details: severity, diagnosis, solution, CVEs"],
  [14500, 20000, "Multi-select CVE filter with server-side search"],
  [20100, 29000, "Select multiple CVEs \u2014 an OR/AND toggle appears automatically"],
  [29300, 35400, "OR finds QIDs matching any CVE. Toggle to AND to require all of them."],
  [35600, 38800, "AND mode turns orange \u2014 only QIDs with both CVEs shown"],
  [38900, 42000, "Clear Filters resets all search inputs and selections in one click"],
  [42200, 45400, "CIDs tab \u2014 26,577 compliance controls with category & technology filters"],
  [45600, 49800, "Policies tab \u2014 5 filter types, Browse & Migration sub-tabs"],
  [49800, 53200, "Settings \u2014 encrypted credential vault, delta/full sync with scheduling"],
  [53400, 56900, "Dark & light themes \u2014 all running in a Docker container"],
];

const TOTAL_MS = 56900;
let startTime = 0;
let animFrame = 0;

function startTour() {
  // Reset GIF by reloading src
  const gif = document.getElementById("tourGif");
  gif.style.visibility = "visible";
  const src = gif.getAttribute("data-src") || gif.src || "qkbe-feature-tour.gif";
  gif.src = "";
  gif.offsetHeight; // force reflow
  gif.src = src;

  document.getElementById("titleCard").classList.add("hidden");
  document.getElementById("endCard").classList.remove("visible");
  document.getElementById("progressFill").style.width = "0%";
  document.querySelector(".subtitle-bar").style.display = "";

  startTime = performance.now();
  cancelAnimationFrame(animFrame);
  tick();
}

function tick() {
  const elapsed = performance.now() - startTime;
  const pct = Math.min(100, (elapsed / TOTAL_MS) * 100);
  document.getElementById("progressFill").style.width = pct + "%";

  // Find active cue
  const sub = document.getElementById("subtitle");
  let found = false;
  for (const [start, end, text] of CUES) {
    if (elapsed >= start && elapsed <= end) {
      sub.textContent = text;
      sub.classList.add("visible");
      found = true;
      break;
    }
  }
  if (!found) {
    sub.classList.remove("visible");
  }

  if (elapsed < TOTAL_MS + 500) {
    animFrame = requestAnimationFrame(tick);
  } else {
    // Freeze GIF and show end card
    sub.classList.remove("visible");
    sub.textContent = "";
    document.querySelector(".subtitle-bar").style.display = "none";
    const gif = document.getElementById("tourGif");
    gif.style.visibility = "hidden";  // hide without broken-image icon
    document.getElementById("endCard").classList.add("visible");
  }
}
</script>
</body>
</html>
