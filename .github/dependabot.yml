version: 2
updates:
  # ── GitHub Actions (always include) ──
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    commit-message:
      prefix: "ci"
    assignees: ["netsecops-76"]
    labels: ["dependencies"]
    groups:
      github-actions:
        patterns: ["*"]

  # ── Python (pip) ──
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    commit-message:
      prefix: "deps"
    assignees: ["netsecops-76"]
    labels: ["dependencies"]
    groups:
      python-deps:
        patterns: ["*"]

  # ── Docker ──
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    commit-message:
      prefix: "deps"
    assignees: ["netsecops-76"]
    labels: ["dependencies"]
